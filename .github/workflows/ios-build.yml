name: iOS Build
on: [push]

jobs:
  build:
    name: Build iOS
    runs-on: macos-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 24

      - name: Install dependencies
        run: npm install

      - name: Sync Capacitor
        run: npx cap sync ios

      - name: Build iOS App
        run: |
          cd ios/App
          xcodebuild -project App.xcodeproj -scheme App -configuration Release -sdk iphoneos build CONFIGURATION_BUILD_DIR="${PWD}/build" CODE_SIGNING_ALLOWED=NO CODE_SIGNING_REQUIRED=NO CODE_SIGN_IDENTITY=""

      - name: Make IPA Payload
        run: |
          mkdir Payload
          mv ios/App/build/App.app Payload/
          zip -r Novogram.ipa Payload

      - name: Upload IPA
        uses: actions/upload-artifact@v4
        with:
          name: Novogram-IPA
          path: Novogram.ipa